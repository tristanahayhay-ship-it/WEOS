version: "3.9"

services:
  backend:
    build: ./backend
    container_name: weos_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - neo4j

  postgres:
    image: postgis/postgis:16-3.4
    container_name: weos_postgres
    restart: always
    environment:
      POSTGRES_USER: weos
      POSTGRES_PASSWORD: weos
      POSTGRES_DB: weos
    ports:
      - "5432:5432"

  neo4j:
    image: neo4j:5
    container_name: weos_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/weos123
    ports:
      - "7474:7474"
      - "7687:7687"
